<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Diş Hekimliği Asistanı — Dt. Bilal Yıldırım</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:        #F0F4F8;
      --surface:   #FFFFFF;
      --border:    #DDE3EA;
      --blue:      #1A56DB;
      --blue-lt:   #EBF0FF;
      --red:       #C81E1E;
      --red-lt:    #FEF2F2;
      --green:     #057A55;
      --green-lt:  #ECFDF5;
      --text:      #111827;
      --muted:     #6B7280;
      --mono:      'DM Mono', monospace;
      --sans:      'DM Sans', sans-serif;
    }

    body {
      font-family: var(--sans);
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      padding: 0 0 64px;
    }

    /* ── Header ── */
    header {
      background: var(--blue);
      color: #fff;
      padding: 20px 20px 18px;
    }
    header h1 {
      font-size: 1.15rem;
      font-weight: 600;
      letter-spacing: -0.01em;
    }
    header p {
      font-size: 0.78rem;
      opacity: 0.75;
      margin-top: 2px;
    }

    /* ── Main ── */
    main { max-width: 600px; margin: 0 auto; padding: 20px 16px 0; }

    /* ── Card ── */
    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 20px;
      margin-bottom: 16px;
    }
    .card-title {
      font-size: 0.7rem;
      font-weight: 600;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 12px;
    }

    /* ── Search ── */
    .search-row {
      display: flex;
      gap: 8px;
    }
    input[type="text"] {
      flex: 1;
      font-family: var(--sans);
      font-size: 0.95rem;
      padding: 10px 14px;
      border: 1.5px solid var(--border);
      border-radius: 8px;
      outline: none;
      background: var(--bg);
      color: var(--text);
      transition: border-color 0.15s;
    }
    input[type="text"]:focus { border-color: var(--blue); background: #fff; }
    input[type="text"]::placeholder { color: var(--muted); }

    button.search-btn {
      font-family: var(--sans);
      font-size: 0.9rem;
      font-weight: 600;
      padding: 10px 18px;
      background: var(--blue);
      color: #fff;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      transition: opacity 0.15s;
      white-space: nowrap;
    }
    button.search-btn:active { opacity: 0.85; }
    button.search-btn:disabled { opacity: 0.5; cursor: not-allowed; }

    /* ── Chips (örnek semptomlar) ── */
    .chips { display: flex; flex-wrap: wrap; gap: 6px; margin-top: 12px; }
    .chip {
      font-size: 0.75rem;
      padding: 4px 10px;
      border-radius: 99px;
      background: var(--blue-lt);
      color: var(--blue);
      cursor: pointer;
      border: 1px solid #c7d6ff;
      font-weight: 500;
      transition: background 0.1s;
    }
    .chip:active { background: #d4e0ff; }

    /* ── Sonuç listesi ── */
    .result-list { display: flex; flex-direction: column; gap: 8px; }

    .result-item {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 12px 14px;
      border: 1.5px solid var(--border);
      border-radius: 10px;
      cursor: pointer;
      transition: border-color 0.15s, background 0.15s;
      background: var(--bg);
    }
    .result-item:active, .result-item.selected {
      border-color: var(--blue);
      background: var(--blue-lt);
    }
    .result-item .icd { font-family: var(--mono); font-size: 0.78rem; color: var(--blue); font-weight: 500; }
    .result-item .tani { font-size: 0.88rem; font-weight: 500; margin-top: 2px; }
    .result-item .arrow { color: var(--muted); font-size: 1.1rem; flex-shrink: 0; margin-left: 8px; }

    /* ── Reçete kartı ── */
    .recete-header {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 8px;
      margin-bottom: 16px;
    }
    .recete-icd {
      font-family: var(--mono);
      font-size: 0.75rem;
      background: var(--blue-lt);
      color: var(--blue);
      border-radius: 6px;
      padding: 3px 8px;
      font-weight: 500;
    }
    .recete-tani { font-size: 1rem; font-weight: 600; margin-top: 6px; }
    .recete-tedavi {
      font-size: 0.82rem;
      color: var(--muted);
      margin-top: 4px;
    }

    .ilac-list { display: flex; flex-direction: column; gap: 10px; margin-bottom: 14px; }
    .ilac-item {
      background: var(--bg);
      border-radius: 8px;
      padding: 12px;
      border-left: 3px solid var(--blue);
    }
    .ilac-ad { font-weight: 600; font-size: 0.88rem; }
    .ilac-kullanim { font-size: 0.82rem; color: var(--muted); margin-top: 3px; }
    .ilac-not {
      font-size: 0.78rem;
      color: var(--blue);
      margin-top: 4px;
      font-style: italic;
    }

    .klinik-not {
      background: var(--red-lt);
      border-left: 3px solid var(--red);
      border-radius: 8px;
      padding: 10px 12px;
      font-size: 0.82rem;
      color: var(--red);
      line-height: 1.5;
    }
    .klinik-not strong { display: block; margin-bottom: 3px; font-size: 0.72rem; letter-spacing: 0.05em; text-transform: uppercase; }

    .yasal-uyari {
      background: #FFFBEB;
      border: 1px solid #FCD34D;
      border-radius: 8px;
      padding: 10px 12px;
      font-size: 0.78rem;
      color: #92400E;
      margin-top: 12px;
      line-height: 1.5;
    }

    /* ── Boş durum ── */
    .empty {
      text-align: center;
      padding: 32px 16px;
      color: var(--muted);
      font-size: 0.88rem;
    }
    .empty .icon { font-size: 2.5rem; margin-bottom: 8px; }

    /* ── Yükleniyor ── */
    .loading {
      text-align: center;
      padding: 24px;
      color: var(--muted);
      font-size: 0.88rem;
    }

    /* ── Hata ── */
    .hata {
      background: var(--red-lt);
      color: var(--red);
      border-radius: 8px;
      padding: 12px;
      font-size: 0.85rem;
    }

    /* ── Footer ── */
    footer {
      text-align: center;
      margin-top: 24px;
      font-size: 0.72rem;
      color: var(--muted);
      line-height: 1.6;
    }
    footer a { color: var(--blue); text-decoration: none; }
  </style>
</head>
<body>

<header>
  <h1>🦷 Diş Hekimliği Asistanı</h1>
  <p>Dt. Bilal Yıldırım · @DtBilalYildirim · ADSM</p>
</header>

<main>

  <!-- Semptom Arama -->
  <div class="card">
    <div class="card-title">Semptom Ara</div>
    <div class="search-row">
      <input type="text" id="semptomInput" placeholder="örn: ağrı, apse, kanama..." />
      <button class="search-btn" id="araBtn" onclick="semptomAra()">Ara</button>
    </div>
    <div class="chips">
      <span class="chip" onclick="hizliAra('ağrı')">ağrı</span>
      <span class="chip" onclick="hizliAra('apse')">apse</span>
      <span class="chip" onclick="hizliAra('kanama')">kanama</span>
      <span class="chip" onclick="hizliAra('çürük')">çürük</span>
      <span class="chip" onclick="hizliAra('hassasiyet')">hassasiyet</span>
      <span class="chip" onclick="hizliAra('aft')">aft</span>
      <span class="chip" onclick="hizliAra('şişlik')">şişlik</span>
      <span class="chip" onclick="hizliAra('tme')">TME</span>
    </div>
  </div>

  <!-- Arama Sonuçları -->
  <div id="sonuclarDiv"></div>

  <!-- Reçete -->
  <div id="receteDiv"></div>

  <footer>
    Bu araç klinik karar desteği amaçlıdır.<br/>
    Hekim değerlendirmesinin yerini tutmaz.<br/>
    <a href="/api" target="_blank">API Dokümantasyonu →</a>
  </footer>

</main>

<script>
  const API = '';  // Aynı domain, boş bırak

  // Enter tuşu ile arama
  document.getElementById('semptomInput').addEventListener('keydown', e => {
    if (e.key === 'Enter') semptomAra();
  });

  function hizliAra(kelime) {
    document.getElementById('semptomInput').value = kelime;
    semptomAra();
  }

  async function semptomAra() {
    const q = document.getElementById('semptomInput').value.trim();
    if (!q) return;

    const sonuclarDiv = document.getElementById('sonuclarDiv');
    const receteDiv = document.getElementById('receteDiv');
    receteDiv.innerHTML = '';

    sonuclarDiv.innerHTML = '<div class="loading">Aranıyor...</div>';
    document.getElementById('araBtn').disabled = true;

    try {
      const res = await fetch(`${API}/api/symptoms?q=${encodeURIComponent(q)}`);
      const data = await res.json();

      if (!res.ok || !data.sonuclar || data.sonuclar.length === 0) {
        sonuclarDiv.innerHTML = `
          <div class="card">
            <div class="empty">
              <div class="icon">🔍</div>
              "<strong>${q}</strong>" için sonuç bulunamadı.<br/>Farklı bir kelime deneyin.
            </div>
          </div>`;
        return;
      }

      let html = `<div class="card">
        <div class="card-title">${data.toplam} Tanı Bulundu</div>
        <div class="result-list">`;

      data.sonuclar.forEach(s => {
        html += `
          <div class="result-item" onclick="receteGetir('${s.icd10}', this)">
            <div>
              <div class="icd">${s.icd10}</div>
              <div class="tani">${s.tani}</div>
            </div>
            <span class="arrow">›</span>
          </div>`;
      });

      html += `</div></div>`;
      sonuclarDiv.innerHTML = html;

    } catch (e) {
      sonuclarDiv.innerHTML = `<div class="card"><div class="hata">Bağlantı hatası. Sayfayı yenileyin.</div></div>`;
    } finally {
      document.getElementById('araBtn').disabled = false;
    }
  }

  async function receteGetir(icd10, el) {
    // Seçili stili uygula
    document.querySelectorAll('.result-item').forEach(i => i.classList.remove('selected'));
    if (el) el.classList.add('selected');

    const receteDiv = document.getElementById('receteDiv');
    receteDiv.innerHTML = '<div class="loading">Reçete yükleniyor...</div>';

    // Sayfayı aşağı kaydır
    setTimeout(() => receteDiv.scrollIntoView({ behavior: 'smooth', block: 'start' }), 100);

    try {
      const res = await fetch(`${API}/api/prescription/${icd10}`);
      const d = await res.json();

      if (!res.ok) {
        receteDiv.innerHTML = `<div class="card"><div class="hata">${d.hata || 'Reçete bulunamadı.'}</div></div>`;
        return;
      }

      let ilaclarHtml = '';
      (d.ilaclar || []).forEach(ilac => {
        ilaclarHtml += `
          <div class="ilac-item">
            <div class="ilac-ad">💊 ${ilac.etken_madde}</div>
            <div class="ilac-kullanim">${ilac.kullanim}</div>
            ${ilac.not ? `<div class="ilac-not">⚠ ${ilac.not}</div>` : ''}
          </div>`;
      });

      receteDiv.innerHTML = `
        <div class="card">
          <div class="card-title">Reçete Şablonu</div>
          <div class="recete-header">
            <div>
              <span class="recete-icd">${d.icd10}</span>
              <div class="recete-tani">${d.tani_adi}</div>
              <div class="recete-tedavi">🔧 ${d.tedavi}</div>
            </div>
          </div>
          <div class="ilac-list">${ilaclarHtml}</div>
          ${d.klinik_not ? `
            <div class="klinik-not">
              <strong>Klinik Not</strong>
              ${d.klinik_not}
            </div>` : ''}
          <div class="yasal-uyari">
            ⚕️ Bu şablon genel rehber niteliğindedir. Her hastanın durumuna göre hekim kararı esastır.
          </div>
        </div>`;

    } catch (e) {
      receteDiv.innerHTML = `<div class="card"><div class="hata">Bağlantı hatası.</div></div>`;
    }
  }
</script>

</body>
</html>
